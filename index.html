<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Acordes Brasil – Pro Chor Mixer</title>

<link rel="stylesheet" href="css/style.css" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" sizes="192x192" />
<meta name="theme-color" content="#0B2F1F" />
</head>

<body>
<div class="container">
  <header>
    <div class="logo"><h1>🎵 Acordes Brasil Pro</h1></div>
    <nav>
      <div class="nav-tabs">
        <button class="tab-btn active">Mixer</button>
        <button class="tab-btn">Training</button>
        <button class="tab-btn">Karaoke</button>
      </div>
    </nav>
  </header>

  <div class="card">
    <h2>🎛️ Chor Mixer</h2>
    <div id="mixer"></div>

    <div class="master">
      <label>Master Volume
        <input type="range" id="masterVol" min="0" max="1" step="0.01" value="1" oninput="setMasterVolume(this.value)" />
      </label>
      <label>Panorama
        <input type="range" id="masterPan" min="-1" max="1" step="0.01" value="0" oninput="setPan(this.value)" />
      </label>
      <label>Pitch Shift
        <input type="range" id="masterPitch" min="-5" max="5" step="1" value="0" oninput="setPitch(this.value)" />
      </label>
    </div>
  </div>

  <div class="card">
    <h2>🎤 Stimmen</h2>
    <div class="voice-buttons">
      <button class="voice-btn voice-soprano" onclick="trainVoice('soprano')">Sopran</button>
      <button class="voice-btn voice-alto" onclick="trainVoice('alto')">Alt</button>
      <button class="voice-btn voice-tenor" onclick="trainVoice('tenor')">Tenor</button>
      <button class="voice-btn voice-bass" onclick="trainVoice('bass')">Bass</button>
      <button class="voice-btn play-all" onclick="playAllVoices()">Alle Stimmen</button>
    </div>

    <div class="progress-bar" id="progressBar" onclick="seekProgress(event)">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="time"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>

    <div class="center"><button class="control-btn" onclick="stopAllAudio()">⏹ Stop</button></div>

    <div class="karaoke">
      <h3>📝 Karaoke</h3>
      <textarea id="songText" rows="3" placeholder="Text hier eingeben..."></textarea>
      <button class="control-btn" onclick="startKaraoke()">🎶 Start Karaoke</button>
      <div id="lyricsDisplay" class="lyrics"></div>
    </div>

    <div id="status" class="status-msg">Bereit</div>
  </div>

  <footer>
    Acordes Brasil – Pro Chor Mixer © <span id="year"></span>
  </footer>
</div>

<script src="js/script.js"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker
    .register("service-worker.js")
    .then(() => console.log("✅ Service Worker aktiv"))
    .catch((err) => console.warn("SW Fehler", err));
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitglieder</title>

<link rel="stylesheet" href="css/style.css">

<style>

.member{
background:#1e293b;
padding:10px;
margin:6px;
border-radius:6px;
color:white;
}

h2{
margin-top:20px;
}

body{
font-family:Arial;
background:#0B1F3B;
color:white;
padding:20px;
}

</style>

</head>

<body>

<h1>👥 Mitglieder</h1>

<div id="membersList"></div>

<script>

fetch("data/members.json")
.then(response => response.json())
.then(data => {

const container = document.getElementById("membersList")

const voices = {
"Sopran": [],
"Alt": [],
"Tenor": [],
"Bass": []
}

data.forEach(member => {

if(voices[member.voice]){
voices[member.voice].push(member.name)
}

})

Object.keys(voices).forEach(voice => {

if(voices[voice].length > 0){

const title = document.createElement("h2")
title.innerText = voice
container.appendChild(title)

voices[voice].forEach(name => {

const div = document.createElement("div")
div.className = "member"
div.innerText = name

container.appendChild(div)

})

}

})

})

</script>

</body>
</html>

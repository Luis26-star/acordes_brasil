<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitglieder</title>

<link rel="stylesheet" href="css/style.css">

<style>
.member{
background:#1e293b;
padding:12px;
margin:8px;
border-radius:8px;
}

.voice{
opacity:0.7;
}
</style>

</head>

<body>

<h1>👥 Mitglieder</h1>

<div id="membersList"></div>

<script>

<script>

fetch("data/members.json")
.then(res => res.json())
.then(data => {

const container = document.getElementById("membersList")

const voices = {
"Sopran": [],
"Alt": [],
"Tenor": [],
"Bass": []
}

data.forEach(member => {

if(voices[member.voice]){
voices[member.voice].push(member.name)
}

})

Object.keys(voices).forEach(voice => {

if(voices[voice].length > 0){

const title = document.createElement("h2")
title.innerText = voice
container.appendChild(title)

voices[voice].forEach(name => {

const div = document.createElement("div")
div.className = "member"

div.innerHTML = `<b>${name}</b>`

container.appendChild(div)

})

}

})

})

</script>

})

})

</script>

</body>
</html>

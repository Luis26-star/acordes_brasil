<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Song Player</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h1 id="songTitle">🎵 Song</h1>

<div class="player">

<button onclick="playAll()">▶ Alle Stimmen</button>
<button onclick="stopAll()">⏹ Stop</button>

<br><br>

<button onclick="playVoice('soprano')">Sopran</button>
<button onclick="playVoice('alto')">Alt</button>
<button onclick="playVoice('tenor')">Tenor</button>
<button onclick="playVoice('bass')">Bass</button>

</div>

<br>

<h3>🎧 Stimmen-Mixer</h3>

Sopran  
<input type="range" min="0" max="1" step="0.1" value="1"
oninput="setVolume('soprano',this.value)">

Alt  
<input type="range" min="0" max="1" step="0.1" value="0.7"
oninput="setVolume('alto',this.value)">

Tenor  
<input type="range" min="0" max="1" step="0.1" value="0.7"
oninput="setVolume('tenor',this.value)">

Bass  
<input type="range" min="0" max="1" step="0.1" value="0.7"
oninput="setVolume('bass',this.value)">

<br><br>

<h3>🐢 Tempo</h3>

<input type="range"
min="0.6"
max="1.2"
step="0.05"
value="1"
oninput="setTempo(this.value)">

<br><br>

<h3>🔁 Loop üben</h3>

Start (Sekunden)  
<input type="number" id="loopStart" value="0">

Ende (Sekunden)  
<input type="number" id="loopEnd" value="10">

<br><br>

<button onclick="startLoop()">▶ Loop starten</button>
<button onclick="stopLoop()">⏹ Loop stoppen</button>

<br><br>

<input type="range"
id="progress"
min="0"
max="100"
value="0"
oninput="seek(this.value)">

<audio id="soprano"></audio>
<audio id="alto"></audio>
<audio id="tenor"></audio>
<audio id="bass"></audio>

<script src="js/player.js"></script>

</body>

</html>

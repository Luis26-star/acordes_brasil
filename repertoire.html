
<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Repertório</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
font-family:Arial;
background:#0B1F3B;
color:white;
padding:20px;
}

.song{
display:flex;
gap:20px;
background:#1e293b;
padding:15px;
margin:15px 0;
border-radius:10px;
align-items:center;
}

.song img{
width:120px;
border-radius:8px;
}

.song-info{
flex:1;
}

audio{
width:100%;
margin:5px 0;
}

a{
color:#4ade80;
}

</style>

</head>

<body>

<h1>🎧 Repertório</h1>

<div id="songs"></div>

<script>

fetch("data/songs.json")
.then(response => response.json())
.then(songs => {

const container = document.getElementById("songs")

songs.forEach(song => {

const div = document.createElement("div")
div.className="song"

div.innerHTML = `

<img src="${song.cover}" alt="${song.title}">

<div class="song-info">

<h2>${song.title}</h2>

<a href="${song.score}" target="_blank">📄 Noten PDF</a>

<h4>Sopran</h4>
<audio controls src="audio/${song.folder}/soprano.mp3"></audio>

<h4>Alt</h4>
<audio controls src="audio/${song.folder}/alto.mp3"></audio>

<h4>Tenor</h4>
<audio controls src="audio/${song.folder}/tenor.mp3"></audio>

<h4>Bass</h4>
<audio controls src="audio/${song.folder}/bass.mp3"></audio>

</div>

`

container.appendChild(div)

})

})

</script>

</body>
</html>

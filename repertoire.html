<script>

console.log("Repertoire script started")

fetch("data/songs.json")
.then(response => response.json())
.then(songs => {

console.log("Songs geladen:", songs)

const container = document.getElementById("songs")

songs.forEach(song => {

const div = document.createElement("div")
div.className="song"

div.innerHTML = `

<img src="${song.cover}" alt="${song.title}">

<div class="song-info">

<h2>${song.title}</h2>

<a href="${song.score}" target="_blank">📄 Noten PDF</a>

<button onclick="playAll('${song.folder}')">
▶ Alle Stimmen starten
</button>

<h4>Sopran</h4>
<audio id="${song.folder}-soprano" controls src="audio/${song.folder}/soprano.mp3"></audio>

<h4>Alt</h4>
<audio id="${song.folder}-alto" controls src="audio/${song.folder}/alto.mp3"></audio>

<h4>Tenor</h4>
<audio id="${song.folder}-tenor" controls src="audio/${song.folder}/tenor.mp3"></audio>

<h4>Bass</h4>
<audio id="${song.folder}-bass" controls src="audio/${song.folder}/bass.mp3"></audio>

</div>

`

container.appendChild(div)

})

})
.catch(error => {
console.error("Fehler beim Laden der Songs:", error)
})

function playAll(song){

const voices=["soprano","alto","tenor","bass"]

voices.forEach(v=>{

const audio=document.getElementById(song+"-"+v)

if(audio){
audio.currentTime=0
audio.play()
}

})

}

</script>

<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Repertório</title>

<style>

<body>

<h1>🎧 Repertório</h1>

<div id="songs" class="song-container"></div>

<script>

fetch("data/songs.json")
.then(response => response.json())
.then(songs => {

const container = document.getElementById("songs")

songs.forEach(song => {

const div = document.createElement("div")
div.className = "song-card"

const cover = `images/covers/${song.folder}.jpg`
const score = `scores/${song.folder}.pdf`

div.innerHTML = `

<div class="song-left">
<img src="${cover}" 
onerror="this.src='images/default-cover.jpg'">
</div>

<div class="song-right">

<h2>${song.title}</h2>

<a class="score" href="${score}" target="_blank">
📄 Noten PDF
</a>

<button onclick="playAll('${song.folder}')">
▶ Alle Stimmen starten
</button>

  <div class="loop-controls">

Start (Sek)
<input type="number" id="${song.folder}-start" value="0">

Ende (Sek)
<input type="number" id="${song.folder}-end" value="30">

<button onclick="startLoop('${song.folder}')">
🔁 Loop starten
</button>

</div>

<h4>Sopran</h4>

  <button onclick="soloVoice('${song.folder}','soprano')">
🎤 Solo
</button>
  
<input type="range"
min="0"
max="1"
step="0.1"
value="1"
oninput="setVolume('${song.folder}','soprano',this.value)">
function startLoop(song){

const start = parseFloat(
document.getElementById(song+"-start").value
)

const end = parseFloat(
document.getElementById(song+"-end").value
)

const voices=["soprano","alto","tenor","bass"]

voices.forEach(v=>{

const audio=document.getElementById(song+"-"+v)

if(audio){

audio.currentTime=start
audio.play()

audio.ontimeupdate=function(){

if(audio.currentTime>=end){
audio.currentTime=start
}

}

}

})

}

  
  function soloVoice(song,voice){

const voices=["soprano","alto","tenor","bass"]

voices.forEach(v=>{

const audio=document.getElementById(song+"-"+v)

if(audio){

if(v===voice){
audio.volume=1
}else{
audio.volume=0.1
}

}

})

}

<audio id="${song.folder}-soprano"
src="audio/${song.folder}/soprano.mp3"></audio>

  
  <h4>Alt</h4>

  <button onclick="soloVoice('${song.folder}','alto')">
🎤 Solo
</button>
  
<input type="range"
min="0"
max="1"
step="0.1"
value="1"
oninput="setVolume('${song.folder}','alto',this.value)">

<audio id="${song.folder}-alto"
src="audio/${song.folder}/alto.mp3"></audio>

  
  <h4>Tenor</h4>

  <button onclick="soloVoice('${song.folder}','tenor')">
🎤 Solo
</button>
  
<input type="range"
min="0"
max="1"
step="0.1"
value="1"
oninput="setVolume('${song.folder}','tenor',this.value)">

<audio id="${song.folder}-tenor"
src="audio/${song.folder}/tenor.mp3"></audio>

  <h4>Bass</h4>

  
  <button onclick="soloVoice('${song.folder}','bass')">
🎤 Solo
</button>

<input type="range"
min="0"
max="1"
step="0.1"
value="1"
oninput="setVolume('${song.folder}','bass',this.value)">

<audio id="${song.folder}-bass"
src="audio/${song.folder}/bass.mp3"></audio>
  
</div>
`

container.appendChild(div)

})

})

function playAll(song){

["soprano","alto","tenor","bass"].forEach(v => {

const audio = document.getElementById(song+"-"+v)

if(audio){
audio.currentTime = 0
audio.play()
}

})

}

</script>

</body>
<h1>🎧 Repertório</h1>

<div id="songs"></div>

<script>

fetch("data/songs.json")
.then(response => response.json())
.then(songs => {

const container = document.getElementById("songs")

songs.forEach(song => {

const div = document.createElement("div")
div.className = "song"

div.innerHTML = `

<img src="${song.cover || 'images/default-cover.jpg'}" alt="${song.title}">

<div class="song-info">

<h2>${song.title}</h2>

<a href="${song.score}" target="_blank">📄 Noten PDF</a>

<br><br>

<button onclick="playAll('${song.folder}')">

function setVolume(song,voice,value){

const audio = document.getElementById(song+"-"+voice)

if(audio){
audio.volume = value
}

}


  
▶ Alle Stimmen starten
</button>

<h4>Sopran</h4>
<audio id="${song.folder}-soprano" controls src="audio/${song.folder}/soprano.mp3"></audio>

<h4>Alt</h4>
<audio id="${song.folder}-alto" controls src="audio/${song.folder}/alto.mp3"></audio>

<h4>Tenor</h4>
<audio id="${song.folder}-tenor" controls src="audio/${song.folder}/tenor.mp3"></audio>

<h4>Bass</h4>
<audio id="${song.folder}-bass" controls src="audio/${song.folder}/bass.mp3"></audio>

</div>

`

container.appendChild(div)

})

})
.catch(error => {
console.error("Fehler beim Laden der Songs:", error)
})

function playAll(song){

const voices = ["soprano","alto","tenor","bass"]

voices.forEach(v => {

const audio = document.getElementById(song + "-" + v)

if(audio){
audio.currentTime = 0
audio.play()
}

})

}

</script>

</body>
</html>
